version: 2

models:
  - name: stg_fires__monthly_fires
    description: >
      Staging model for raw fire detection events. Renames and casts columns
      from raw_data.monthly_fires. Filters rows without country or municipality.
    columns:
      - name: fire_event_id
        description: "UUID of the fire detection event."
        tests:
          - not_null
          - unique
      - name: country
        description: "Country name."
        tests:
          - not_null
      - name: municipality
        description: "Municipality name."
        tests:
          - not_null
      - name: state
        description: "State or province."
      - name: country_id
        description: "Numeric country identifier."
      - name: state_id
        description: "Numeric state identifier."
      - name: municipality_id
        description: "Numeric municipality identifier."
      - name: precipitation_mm
        description: "Precipitation in mm."
      - name: fire_risk_score
        description: "Fire risk score 0–1."
      - name: fire_radiative_power_mw
        description: "Fire Radiative Power in MW."
      - name: days_without_rain
        description: "Consecutive days without rain."
      - name: detected_at
        description: "UTC timestamp of detection."
      - name: satellite
        description: "Satellite identifier."
      - name: biome
        description: "Biome classification."
