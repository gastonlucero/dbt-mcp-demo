name: "dbt_demo_postgres"
version: "1.0.0"
config-version: 2

profile: "dbt_demo"

model-paths: ["models"]
analysis-paths: ["analysis"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
packages-install-path: "dbt_packages"

clean-targets:
  - "target"
  - "dbt_modules"
  - "dbt_packages"

flags:
  partial_parse: true

vars:
  mcp_server_url: "http://localhost:9001/mcp/"
  mcp_auth_token: "test-token"

models:
  dbt_demo_postgres:
    staging:
      +materialized: ephemeral
      +tags: ["staging"]
    intermediate:
      +materialized: view
      +tags: ["intermediate"]
    marts:
      +materialized: table
      +tags: ["marts"]

on-run-start:
  - "{{ log('dbt Analytics ETL starting...', info=true) }}"

on-run-end:
  - "{{ log('dbt Analytics ETL completed!', info=true) }}"

dispatch:
  - macro_namespace: dbt_utils
    search_order: ["dbt_demo_postgres", "dbt_utils"]
